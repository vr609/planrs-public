<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section 4 – Staying Safe Online | Planrs</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@700;800;900&family=Nunito+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --pink: #FF6B9D;
    --pink-light: #FFB3CC;
    --pink-pale: #FFF0F6;
    --red: #E8194B;
    --green: #00C97A;
    --green-light: #C8FFE8;
    --yellow: #FFD53D;
    --purple: #C77DFF;
    --blue: #5BC8FF;
    --card-bg: #fff;
    --shadow: 0 8px 32px rgba(255,107,157,0.15);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Nunito Sans', sans-serif;
    background: var(--pink-pale);
    min-height: 100vh;
    padding: 16px 12px 40px;
    overflow-x: hidden;
    position: relative;
  }

  /* Floating background shapes */
  .bg-shapes { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
  .bg-shapes span {
    position: absolute;
    border-radius: 50%;
    opacity: 0.12;
    animation: floatBubble linear infinite;
  }
  .bg-shapes span:nth-child(1) { width:90px; height:90px; background:var(--pink); left:5%; top:10%; animation-duration:12s; animation-delay:0s; }
  .bg-shapes span:nth-child(2) { width:60px; height:60px; background:var(--purple); left:80%; top:20%; animation-duration:9s; animation-delay:-3s; }
  .bg-shapes span:nth-child(3) { width:120px; height:120px; background:var(--yellow); left:60%; top:60%; animation-duration:15s; animation-delay:-5s; }
  .bg-shapes span:nth-child(4) { width:70px; height:70px; background:var(--blue); left:20%; top:70%; animation-duration:11s; animation-delay:-2s; }
  .bg-shapes span:nth-child(5) { width:50px; height:50px; background:var(--green); left:90%; top:80%; animation-duration:8s; animation-delay:-7s; }
  @keyframes floatBubble {
    0% { transform: translateY(0) rotate(0deg); }
    50% { transform: translateY(-30px) rotate(180deg); }
    100% { transform: translateY(0) rotate(360deg); }
  }

  /* Confetti container */
  #confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 999; overflow: hidden; }
  .confetti-piece {
    position: absolute;
    width: 10px; height: 14px;
    border-radius: 2px;
    animation: confettiFall linear forwards;
    top: -20px;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(110vh) rotate(720deg) scale(0.5); opacity: 0; }
  }

  /* Close button */
  .close-btn {
    position: fixed;
    top: 14px; right: 14px;
    width: 44px; height: 44px;
    background: #fff;
    border: 3px solid var(--pink-light);
    border-radius: 50%;
    font-size: 1.3rem;
    cursor: pointer;
    z-index: 200;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 4px 12px rgba(255,107,157,0.2);
    transition: all 0.2s;
    color: var(--red);
    font-weight: 900;
  }
  .close-btn:hover { transform: scale(1.15) rotate(10deg); background: #FFE0EC; }

  /* Planrs logo */
  .planrs-logo {
    position: fixed; top: 14px; left: 14px;
    background: linear-gradient(135deg, var(--pink), var(--red));
    color: #fff;
    font-family: 'Nunito', sans-serif;
    font-weight: 900;
    font-size: 14px;
    padding: 6px 14px;
    border-radius: 20px;
    z-index: 200;
    box-shadow: 0 4px 12px rgba(232,25,75,0.25);
    letter-spacing: 0.5px;
  }

  /* Header */
  .header { text-align: center; padding: 52px 0 6px; position: relative; z-index: 1; }
  .header h1 {
    font-family: 'Nunito', sans-serif;
    font-size: 1.7rem;
    font-weight: 900;
    color: var(--red);
    margin-bottom: 4px;
    text-shadow: 0 2px 0 rgba(232,25,75,0.12);
  }
  .header .subtitle {
    color: #b05070;
    font-size: 0.95rem;
    font-weight: 600;
  }

  /* Character mascot */
  .mascot {
    text-align: center;
    font-size: 2.8rem;
    margin: 8px 0 4px;
    animation: mascotBounce 2s ease-in-out infinite;
    display: block;
    position: relative; z-index: 1;
  }
  @keyframes mascotBounce {
    0%,100% { transform: translateY(0) rotate(-3deg); }
    50% { transform: translateY(-10px) rotate(3deg); }
  }
  .mascot-speech {
    display: inline-block;
    background: #fff;
    border: 2.5px solid var(--pink-light);
    border-radius: 18px;
    padding: 6px 16px;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--red);
    margin: 4px auto 12px;
    position: relative;
    z-index: 1;
    box-shadow: 0 3px 10px rgba(255,107,157,0.15);
    animation: speechPop 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes speechPop { from{transform:scale(0.5);opacity:0} to{transform:scale(1);opacity:1} }

  /* Progress */
  .progress-row {
    display: flex; align-items: center; gap: 10px;
    max-width: 540px; margin: 0 auto 14px;
    position: relative; z-index: 1;
    padding: 0 4px;
  }
  .q-num {
    font-family: 'Nunito', sans-serif;
    font-weight: 900; color: var(--red); font-size: 0.95rem; white-space: nowrap;
    background: #fff;
    border: 2px solid var(--pink-light);
    border-radius: 10px;
    padding: 4px 10px;
  }
  .progress-bar-wrap {
    flex: 1; height: 14px; background: #f0d0de; border-radius: 20px;
    overflow: hidden; border: 2px solid var(--pink-light);
  }
  .progress-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--yellow), var(--pink), var(--red));
    border-radius: 20px;
    transition: width 0.6s cubic-bezier(0.34,1.56,0.64,1);
    position: relative;
  }
  .progress-bar::after {
    content: '🌟';
    position: absolute; right: -2px; top: 50%;
    transform: translateY(-50%);
    font-size: 14px;
  }
  .score-box {
    background: linear-gradient(135deg, var(--yellow), #FFBA00);
    border-radius: 10px; padding: 5px 12px;
    font-family: 'Nunito', sans-serif;
    font-size: 0.92rem; font-weight: 900; color: #7a5000; white-space: nowrap;
    box-shadow: 0 3px 8px rgba(255,180,0,0.3);
    border: 2px solid #FFBA00;
  }

  /* Quiz Card */
  .quiz-card {
    background: var(--card-bg);
    border: 3px solid var(--pink-light);
    border-radius: 24px;
    padding: 24px 22px 20px;
    max-width: 540px;
    margin: 0 auto 20px;
    position: relative; z-index: 1;
    box-shadow: var(--shadow);
    animation: cardSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1);
  }
  @keyframes cardSlideIn {
    from { transform: translateY(30px) scale(0.92); opacity: 0; }
    to { transform: translateY(0) scale(1); opacity: 1; }
  }

  .q-category {
    display: inline-flex; align-items: center; gap: 4px;
    background: linear-gradient(135deg, #FFE0EC, #FFCCE0);
    color: var(--red);
    font-size: 0.8rem; font-weight: 800;
    padding: 4px 14px; border-radius: 20px;
    margin-bottom: 12px;
    border: 1.5px solid var(--pink-light);
    font-family: 'Nunito', sans-serif;
  }
  .q-text {
    font-family: 'Nunito', sans-serif;
    font-size: 1.08rem; font-weight: 800; color: #1a1a2e;
    margin-bottom: 18px; line-height: 1.5;
  }
  .options { display: flex; flex-direction: column; gap: 10px; }
  .opt {
    padding: 13px 16px;
    border: 2.5px solid var(--pink-light);
    border-radius: 14px;
    background: var(--pink-pale);
    font-family: 'Nunito Sans', sans-serif;
    font-size: 0.95rem; cursor: pointer; font-weight: 700;
    transition: all 0.18s;
    text-align: left; width: 100%;
    display: flex; align-items: center; gap: 10px;
    color: #333;
    position: relative; overflow: hidden;
  }
  .opt-letter {
    min-width: 28px; height: 28px;
    background: var(--pink-light);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Nunito', sans-serif;
    font-size: 0.82rem; font-weight: 900; color: var(--red);
    transition: all 0.18s;
  }
  .opt:hover:not(:disabled) {
    background: #FFE8F2;
    border-color: var(--pink);
    transform: translateX(4px) scale(1.01);
  }
  .opt:hover:not(:disabled) .opt-letter { background: var(--pink); color: #fff; }

  .opt.correct {
    background: var(--green-light);
    border-color: var(--green);
    color: #006b40;
    animation: correctPop 0.5s cubic-bezier(0.34,1.56,0.64,1);
  }
  .opt.correct .opt-letter { background: var(--green); color: #fff; }
  .opt.wrong {
    background: #FFE0E8;
    border-color: var(--red);
    color: var(--red);
    animation: wrongShake 0.5s ease;
  }
  .opt.wrong .opt-letter { background: var(--red); color: #fff; }

  @keyframes correctPop {
    0%{transform:scale(0.92)} 50%{transform:scale(1.05)} 100%{transform:scale(1)}
  }
  @keyframes wrongShake {
    0%,100%{transform:translateX(0)} 20%{transform:translateX(-10px)} 40%{transform:translateX(10px)} 60%{transform:translateX(-6px)} 80%{transform:translateX(6px)}
  }

  /* Stars burst on correct */
  .star-burst {
    position: absolute; top: 50%; right: 16px;
    transform: translateY(-50%);
    font-size: 1.4rem;
    animation: starBurst 0.6s cubic-bezier(0.34,1.56,0.64,1) forwards;
    pointer-events: none;
  }
  @keyframes starBurst {
    0% { transform: translateY(-50%) scale(0) rotate(-30deg); opacity:1; }
    60% { transform: translateY(-70%) scale(1.4) rotate(20deg); opacity:1; }
    100% { transform: translateY(-120%) scale(0.8) rotate(0deg); opacity:0; }
  }

  .explanation {
    margin-top: 14px; padding: 13px 16px;
    background: #F0FFF7; border-left: 5px solid var(--green);
    border-radius: 12px; font-size: 0.92rem; color: #006b40;
    font-weight: 700; display: none; line-height: 1.5;
    animation: fadeSlideIn 0.3s ease;
  }
  .explanation.show { display: block; }
  .explanation.wrong-exp { background: #FFF0F4; border-color: var(--red); color: var(--red); }
  @keyframes fadeSlideIn {
    from{opacity:0;transform:translateY(-8px)} to{opacity:1;transform:translateY(0)}
  }

  /* Next button */
  .nav-btn {
    display: flex; align-items: center; justify-content: center; gap: 8px;
    margin: 16px auto 0;
    background: linear-gradient(135deg, var(--pink), var(--red));
    color: #fff; border: none; border-radius: 14px;
    padding: 13px 32px; font-size: 1rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 6px 18px rgba(232,25,75,0.3);
    letter-spacing: 0.3px;
  }
  .nav-btn:hover:not(:disabled) { transform: translateY(-3px) scale(1.04); box-shadow: 0 10px 24px rgba(232,25,75,0.38); }
  .nav-btn:disabled { background: #ddd; box-shadow: none; cursor: not-allowed; color: #aaa; }

  /* Result panel */
  .result-panel {
    display: none; text-align: center;
    background: var(--card-bg);
    border: 3px solid var(--pink-light);
    border-radius: 28px; padding: 32px 24px;
    max-width: 520px; margin: 10px auto;
    position: relative; z-index: 1;
    box-shadow: var(--shadow);
  }
  .result-panel.show { display: block; animation: cardSlideIn 0.5s cubic-bezier(0.34,1.56,0.64,1); }
  .result-emoji { font-size: 4rem; animation: mascotBounce 2s ease-in-out infinite; display: block; }
  .result-msg {
    font-family: 'Nunito', sans-serif;
    font-size: 1.4rem; font-weight: 900; color: var(--red); margin: 12px 0 4px;
  }
  .stars { font-size: 1.8rem; letter-spacing: 4px; margin: 8px 0; }
  .result-sub { color: #888; margin-bottom: 16px; font-size: 0.95rem; font-weight: 600; }
  .review-list { text-align: left; max-width: 440px; margin: 14px auto 20px; }
  .review-item {
    font-size: 0.88rem; padding: 8px 12px; border-radius: 10px; margin-bottom: 6px;
    font-weight: 700; display: flex; align-items: center; gap: 8px;
  }
  .review-item.correct { background: var(--green-light); color: #006b40; border: 1.5px solid var(--green); }
  .review-item.wrong { background: #FFE0E8; color: var(--red); border: 1.5px solid var(--pink); }

  .btn-row { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; }
  .btn {
    background: linear-gradient(135deg, var(--pink), var(--red));
    color: #fff; border: none; border-radius: 14px;
    padding: 12px 24px; font-size: 0.97rem; font-weight: 800;
    cursor: pointer; transition: all 0.2s;
    font-family: 'Nunito', sans-serif;
    box-shadow: 0 5px 14px rgba(232,25,75,0.28);
    display: flex; align-items: center; gap: 6px;
  }
  .btn:hover { transform: translateY(-2px) scale(1.04); }
  .btn.green { background: linear-gradient(135deg, #00C97A, #008C54); box-shadow: 0 5px 14px rgba(0,200,122,0.28); }

  /* Score counter animation */
  @keyframes scorePop {
    0%{transform:scale(1)} 50%{transform:scale(1.5)} 100%{transform:scale(1)}
  }
  .score-pop { animation: scorePop 0.4s cubic-bezier(0.34,1.56,0.64,1); }

  /* Wobbly decorative elements */
  .deco { position: absolute; pointer-events: none; }

  /* Modal close overlay */
  .close-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 300; align-items: center; justify-content: center; }
  .close-modal.show { display: flex; }
  .close-modal-box {
    background: #fff; border-radius: 24px; padding: 32px 28px; max-width: 340px; width: 90%;
    text-align: center; border: 3px solid var(--pink-light);
    box-shadow: 0 20px 60px rgba(255,107,157,0.25);
    animation: cardSlideIn 0.3s cubic-bezier(0.34,1.56,0.64,1);
  }
  .close-modal-box h2 { font-family:'Nunito',sans-serif; font-size:1.3rem; font-weight:900; color:var(--red); margin-bottom:8px; }
  .close-modal-box p { color:#777; font-weight:600; font-size:0.92rem; margin-bottom:20px; }
  .close-modal-btns { display: flex; gap: 10px; justify-content: center; }
</style>
</head>
<body>
<div class="bg-shapes">
  <span></span><span></span><span></span><span></span><span></span>
</div>
<div id="confetti-container"></div>

<!-- Close Button -->
<button class="close-btn" onclick="showCloseModal()" title="Close quiz">✕</button>
<div class="planrs-logo">⭐ Planrs</div>

<!-- Close Confirmation Modal -->
<div class="close-modal" id="closeModal">
  <div class="close-modal-box">
    <div style="font-size:2.5rem;margin-bottom:8px;">🤔</div>
    <h2>Wait! Are you sure?</h2>
    <p>You're doing amazing! Your progress will be lost if you leave now.</p>
    <div class="close-modal-btns">
      <button class="btn" onclick="hideCloseModal()">🚀 Keep Going!</button>
      <button class="btn" style="background:#aaa;box-shadow:none;" onclick="window.close()">Leave</button>
    </div>
  </div>
</div>

<div class="header">
  <h1>🛡️ How to Stay Safe Online</h1>
  <p class="subtitle">Section 4 Quiz — 8 questions about protecting yourself!</p>
</div>

<span class="mascot" id="mascot">🦸</span>
<div style="text-align:center;position:relative;z-index:1;">
  <span class="mascot-speech" id="speechBubble">You've got this, Safety Hero! 💪</span>
</div>

<div class="progress-row">
  <div class="q-num">Q <span id="currentQ">1</span>/8</div>
  <div class="progress-bar-wrap"><div class="progress-bar" id="progress" style="width:12.5%"></div></div>
  <div class="score-box" id="scoreBox">⭐ <span id="score">0</span>/8</div>
</div>

<div class="quiz-card" id="quizCard"></div>

<div class="result-panel" id="resultPanel">
  <span class="result-emoji" id="resultEmoji">🎉</span>
  <div class="result-msg" id="resultMsg"></div>
  <div class="stars" id="resultStars"></div>
  <p class="result-sub" id="resultSub"></p>
  <div class="review-list" id="reviewList"></div>
  <div class="btn-row">
    <button class="btn" onclick="resetQuiz()">🔄 Try Again</button>
    <button class="btn green" onclick="celebrate()">🎊 Finish Lesson!</button>
  </div>
</div>

<script>
const questions = [
  {
    cat: "🔒 Privacy & Safety",
    q: "Riya is being harassed on Instagram. What should she do FIRST?",
    options: ["Reply with angry messages", "Block and report the bully", "Delete her Instagram", "Tell all her friends to fight back"],
    correct: 1,
    exp: "✅ Block and Report is always the first step! Instagram's safety features are there to protect you.",
    mascot: "🦸", speech: "Block & Report = Superpower! 🚫"
  },
  {
    cat: "📱 Online Behavior",
    q: "Your friend shares a hurtful meme about your classmate in the WhatsApp group. What is the RIGHT thing to do?",
    options: ["Forward it to others since it's funny", "React with a laughing emoji", "Tell your friend privately that it is unkind", "Take a screenshot and share it more"],
    correct: 2,
    exp: "✅ Talking to your friend privately is brave and kind. You become an upstander, not a bystander!",
    mascot: "🌟", speech: "Be brave, be kind! 💬"
  },
  {
    cat: "🚨 When to Tell an Adult",
    q: "Which of the following situations MOST needs you to tell a trusted adult immediately?",
    options: ["Someone liked your photo on Instagram", "You received a threat saying 'I will hurt you at school'", "Your friend posted a silly photo of you", "You got fewer followers than last week"],
    correct: 1,
    exp: "✅ Any threat to physical safety must be reported to a parent or teacher immediately. This is very serious.",
    mascot: "🧑‍🏫", speech: "Always tell a trusted adult! 🏃"
  },
  {
    cat: "🛡️ Protecting Yourself",
    q: "Which is the BEST way to protect your personal information online?",
    options: ["Share your address only with close friends online", "Keep all social media profiles public for more followers", "Never share your phone number, address or school name online", "Use your full real name as your username"],
    correct: 2,
    exp: "✅ Personal information like your address, phone number and school name should NEVER be shared online.",
    mascot: "🔐", speech: "Keep your info private! 🔒"
  },
  {
    cat: "💬 Digital Empathy",
    q: "Before posting a comment about someone online, what is the BEST thing to ask yourself?",
    options: ["Will this get me more likes?", "Is this comment kind, necessary and true?", "Would it be funny to others?", "Has someone said this before?"],
    correct: 1,
    exp: "✅ Always use the THINK rule: Is it True, Helpful, Inspiring, Necessary, Kind? If not — don't post!",
    mascot: "💭", speech: "THINK before you type! ✍️"
  },
  {
    cat: "📸 Photo Safety",
    q: "Your friend sends you someone else's embarrassing photo and asks you to forward it. What do you do?",
    options: ["Forward it — your friend asked you to", "Save it but don't forward it", "Refuse to forward it and tell your friend it's wrong", "Post it on your own story"],
    correct: 2,
    exp: "✅ Forwarding embarrassing photos without consent is cyberbullying — even if someone else started it!",
    mascot: "📵", speech: "Don't share, care! 💕"
  },
  {
    cat: "🏫 School Safety",
    q: "If cyberbullying continues even after you report it online, you should:",
    options: ["Handle it yourself and stay quiet", "Reply aggressively so they stop", "Tell your school counselor or teacher", "Make a fake profile and bully them back"],
    correct: 2,
    exp: "✅ School counselors and teachers are trained to help. You are never alone — always ask for help!",
    mascot: "🤝", speech: "You're never alone! 💙"
  },
  {
    cat: "🌐 Being an Upstander",
    q: "An 'upstander' is someone who:",
    options: ["Watches cyberbullying happen and does nothing", "Joins in the bullying to be popular", "Speaks up or supports the victim", "Stays offline to avoid getting involved"],
    correct: 2,
    exp: "✅ Be an UPSTANDER not a bystander! Supporting a victim — even with a kind message — makes a huge difference.",
    mascot: "🦸‍♀️", speech: "Be the hero someone needs! ⭐"
  }
];

const encouragements = ["Awesome! Keep going! 🎉", "You're crushing it! 🔥", "Incredible! 🌟", "So smart! ✨", "Way to go, hero! 🦸"];
const tryAgains = ["Almost! Try again! 😊", "You'll get it! 💪", "Don't give up! 🌈", "Keep trying! 🎯"];

let current = 0, score = 0, answers = [], answered = false;

function confetti() {
  const colors = ['#FF6B9D','#FFD53D','#00C97A','#5BC8FF','#C77DFF','#FF6B6B'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random()*100 + 'vw';
    el.style.background = colors[Math.floor(Math.random()*colors.length)];
    el.style.width = (8 + Math.random()*8) + 'px';
    el.style.height = (10 + Math.random()*10) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (1.5 + Math.random()*2) + 's';
    el.style.animationDelay = (Math.random()*0.8) + 's';
    document.getElementById('confetti-container').appendChild(el);
    setTimeout(() => el.remove(), 3500);
  }
}

function updateMascot(mascotEmoji, speechText) {
  const m = document.getElementById('mascot');
  const s = document.getElementById('speechBubble');
  m.textContent = mascotEmoji;
  m.style.animation = 'none';
  void m.offsetWidth;
  m.style.animation = '';
  s.textContent = speechText;
  s.style.animation = 'none';
  void s.offsetWidth;
  s.style.animation = 'speechPop 0.4s cubic-bezier(0.34,1.56,0.64,1)';
}

function renderQuestion() {
  answered = false;
  const q = questions[current];
  updateMascot(q.mascot, q.speech);
  const card = document.getElementById('quizCard');
  card.style.animation = 'none';
  void card.offsetWidth;
  card.style.animation = 'cardSlideIn 0.4s cubic-bezier(0.34,1.56,0.64,1)';
  card.innerHTML = `
    <div class="q-category">${q.cat}</div>
    <div class="q-text">Q${current+1}. ${q.q}</div>
    <div class="options">
      ${q.options.map((o,i) => `
        <button class="opt" id="opt${i}" onclick="checkAnswer(${i})">
          <span class="opt-letter">${String.fromCharCode(65+i)}</span>
          <span>${o}</span>
        </button>
      `).join('')}
    </div>
    <div class="explanation" id="explanation"></div>
    <button class="nav-btn" id="nextBtn" onclick="nextQuestion()" disabled>
      ${current===7 ? '🏁 See My Results!' : 'Next Question ➡️'}
    </button>
  `;
  document.getElementById('currentQ').textContent = current + 1;
  document.getElementById('progress').style.width = ((current+1)/8*100)+'%';
}

function checkAnswer(i) {
  if (answered) return;
  answered = true;
  const q = questions[current];
  const allOpts = document.querySelectorAll('.opt');
  allOpts.forEach(o => o.disabled = true);
  const correct = i === q.correct;
  allOpts[i].classList.add(correct ? 'correct' : 'wrong');
  allOpts[q.correct].classList.add('correct');

  if (correct) {
    const burst = document.createElement('span');
    burst.className = 'star-burst';
    burst.textContent = '⭐';
    allOpts[i].appendChild(burst);
    score++;
    const scoreEl = document.getElementById('score');
    scoreEl.textContent = score;
    const scoreBox = document.getElementById('scoreBox');
    scoreBox.style.animation = 'none';
    void scoreBox.offsetWidth;
    scoreBox.style.animation = 'scorePop 0.4s cubic-bezier(0.34,1.56,0.64,1)';
    updateMascot('🎉', encouragements[Math.floor(Math.random()*encouragements.length)]);
    if (score === 8) confetti();
  } else {
    updateMascot('😅', tryAgains[Math.floor(Math.random()*tryAgains.length)]);
  }

  const exp = document.getElementById('explanation');
  exp.textContent = correct ? q.exp : '❌ Not quite! ' + q.exp;
  exp.className = 'explanation show' + (correct ? '' : ' wrong-exp');
  answers.push({ q: q.q, chosen: i, correct: q.correct, isCorrect: correct });
  document.getElementById('nextBtn').disabled = false;
}

function nextQuestion() {
  current++;
  if (current >= 8) { showResult(); return; }
  renderQuestion();
}

function showResult() {
  document.getElementById('quizCard').style.display = 'none';
  document.getElementById('progress').style.width = '100%';
  const panel = document.getElementById('resultPanel');
  panel.classList.add('show');
  const pct = score / 8;
  let emoji, msg, sub, stars;
  if (pct === 1) {
    emoji='🌟'; msg='Perfect Score! Internet Safety Champion!';
    sub='Outstanding! You know exactly how to stay safe online. Share this quiz with your friends!';
    stars='⭐⭐⭐⭐⭐';
    confetti(); setTimeout(confetti, 600); setTimeout(confetti, 1200);
    updateMascot('🏆', "You're a champion! 🌟");
  } else if (pct >= 0.75) {
    emoji='🎉'; msg=`Brilliant! You're a Safety Star! (${score}/8)`;
    sub="You're doing really well with online safety. Review the ones you missed!";
    stars='⭐⭐⭐⭐'; confetti();
    updateMascot('😄', "Amazing work! 🎉");
  } else if (pct >= 0.5) {
    emoji='👍'; msg=`Good Effort! Keep Learning! (${score}/8)`;
    sub="You got some great ones! Read the tips carefully and try again.";
    stars='⭐⭐⭐';
    updateMascot('💪', "Keep it up! You can do it!");
  } else {
    emoji='💪'; msg=`Keep Practicing! (${score}/8)`;
    sub="Online safety is important. Go through the lesson again and you'll nail it!";
    stars='⭐⭐';
    updateMascot('📚', "Let's review and try again! 😊");
  }
  document.getElementById('resultEmoji').textContent = emoji;
  document.getElementById('resultMsg').textContent = msg;
  document.getElementById('resultSub').textContent = sub;
  document.getElementById('resultStars').textContent = stars;
  const list = document.getElementById('reviewList');
  answers.forEach((a, idx) => {
    const div = document.createElement('div');
    div.className = 'review-item ' + (a.isCorrect ? 'correct' : 'wrong');
    div.innerHTML = `<span>${a.isCorrect ? '✅' : '❌'}</span><span>Q${idx+1}: ${questions[idx].options[a.correct]}</span>`;
    list.appendChild(div);
  });
}

function resetQuiz() {
  current = 0; score = 0; answers = [];
  document.getElementById('score').textContent = '0';
  document.getElementById('resultPanel').classList.remove('show');
  document.getElementById('quizCard').style.display = 'block';
  document.getElementById('reviewList').innerHTML = '';
  renderQuestion();
}

function celebrate() {
  confetti(); setTimeout(confetti, 400); setTimeout(confetti, 800);
  updateMascot('🏅', "You're an Internet Safety Hero! 🛡️");
  setTimeout(() => alert('🎊 Congratulations! You have completed the full Cyberbullying lesson on Planrs!\n\nYou are now an Internet Safety champion. Stay safe online! 🛡️'), 300);
}

function showCloseModal() {
  document.getElementById('closeModal').classList.add('show');
}
function hideCloseModal() {
  document.getElementById('closeModal').classList.remove('show');
}
document.getElementById('closeModal').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) hideCloseModal();
});

renderQuestion();
</script>
</body>
</html>
