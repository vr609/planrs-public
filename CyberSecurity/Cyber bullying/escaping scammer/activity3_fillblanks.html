<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section 3 – Escape a Scammer! | Planrs</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;800;900&family=Fredoka+One&family=Caveat:wght@600;700&display=swap" rel="stylesheet">
<style>
:root{
  --green:#1B7A56;
  --mint:#06D6A0;
  --mint-light:#E0FFF6;
  --peach:#FF8C69;
  --yellow:#FFD166;
  --purple:#B388FF;
  --pink:#FF80AB;
  --blue:#64B5F6;
  --orange:#FFB74D;
  --bg:#F5FFFB;
  --card:#FFFFFF;
  --text:#1A2E25;
  --muted:#7A9A8A;
  --red:#FF4D6D;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  padding:16px 12px 40px;
  color:var(--text);
  background-image:
    radial-gradient(circle at 5% 10%,#E0FFF688 0%,transparent 50%),
    radial-gradient(circle at 95% 90%,#FFF8E088 0%,transparent 50%),
    radial-gradient(circle at 50% 50%,#F0F0FF44 0%,transparent 70%);
}

/* floating confetti dots */
.confetti-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;overflow:hidden;z-index:0;}
.dot{position:absolute;border-radius:50%;opacity:0.13;animation:floatUp linear infinite;}
@keyframes floatUp{0%{transform:translateY(100vh) rotate(0deg);}100%{transform:translateY(-100px) rotate(360deg);}}

.logo{position:fixed;top:12px;right:14px;font-family:'Fredoka One',cursive;font-size:14px;color:var(--green);background:#fff;border:2.5px solid var(--mint);border-radius:20px;padding:4px 14px;z-index:999;box-shadow:0 2px 8px #06D6A025;letter-spacing:1px;}

/* HEADER */
.header{text-align:center;padding:10px 0 18px;position:relative;z-index:1;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--green),var(--mint));color:#fff;font-weight:900;font-size:12px;border-radius:20px;padding:5px 18px;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase;}
h1{font-family:'Fredoka One',cursive;font-size:clamp(26px,7vw,42px);color:var(--green);line-height:1.15;letter-spacing:0.5px;}
.sub{font-size:12px;color:var(--muted);font-weight:700;margin-top:6px;text-transform:uppercase;letter-spacing:1px;}

/* SCORE */
.score-bar{display:flex;align-items:center;gap:10px;background:#fff;border-radius:16px;padding:10px 16px;margin-bottom:16px;border:2.5px solid #C0EFE0;box-shadow:0 3px 14px #06D6A018;position:relative;z-index:1;}
.s-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.s-n{font-family:'Fredoka One',cursive;font-size:32px;color:var(--mint);}
.s-t{font-size:13px;color:var(--muted);font-weight:800;}
.s-wrap{flex:1;background:#E0FFF6;border-radius:8px;height:12px;overflow:hidden;}
.s-bar{height:12px;background:linear-gradient(90deg,var(--green),var(--mint),var(--yellow));border-radius:8px;transition:width 0.6s cubic-bezier(.34,1.56,.64,1);}

/* WORD BANK */
.wb-wrap{position:relative;z-index:1;margin-bottom:14px;}
.wb-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}
.wb-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.2px;}
.wb-close{background:var(--red);color:#fff;border:none;border-radius:50%;width:26px;height:26px;font-size:14px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:transform 0.2s,box-shadow 0.2s;box-shadow:0 2px 8px #FF4D6D44;flex-shrink:0;}
.wb-close:hover{transform:scale(1.15) rotate(90deg);box-shadow:0 4px 14px #FF4D6D66;}
.word-bank{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;background:#fff;border:2.5px solid #C0EFE0;border-radius:18px;padding:14px 12px;transition:all 0.35s cubic-bezier(.34,1.56,.64,1);overflow:hidden;}
.word-bank.collapsed{max-height:0;padding:0;border-width:0;opacity:0;pointer-events:none;margin:0;}
.word-bank.expanded{max-height:400px;opacity:1;}

/* WORD CHIP COLORS */
.word-chip{
  border-radius:24px;
  padding:8px 16px;
  font-size:13px;
  font-weight:800;
  cursor:grab;
  transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  user-select:none;
  border:2.5px solid transparent;
  font-family:'Nunito',sans-serif;
  position:relative;
  box-shadow:0 3px 8px rgba(0,0,0,0.1);
}
.word-chip:active{cursor:grabbing;transform:scale(1.12) rotate(-3deg);}
.word-chip:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 6px 16px rgba(0,0,0,0.18);}
.word-chip.selected{transform:scale(1.12) translateY(-3px);box-shadow:0 8px 20px rgba(0,0,0,0.22);outline:3px dashed #fff;outline-offset:2px;}
.word-chip.used{background:#f0f0f0 !important;color:#bbb !important;border-color:#ddd !important;pointer-events:none;transform:none;box-shadow:none;opacity:0.5;}
.word-chip.dragging{opacity:0.4;transform:scale(0.95);}

/* chip color variants */
.chip-c0{background:#E8F5E9;color:#2E7D32;border-color:#A5D6A7;}
.chip-c1{background:#E3F2FD;color:#1565C0;border-color:#90CAF9;}
.chip-c2{background:#FCE4EC;color:#880E4F;border-color:#F48FB1;}
.chip-c3{background:#FFF8E1;color:#E65100;border-color:#FFCC02;}
.chip-c4{background:#F3E5F5;color:#6A1B9A;border-color:#CE93D8;}
.chip-c5{background:#E0F7FA;color:#006064;border-color:#80DEEA;}
.chip-c6{background:#FBE9E7;color:#BF360C;border-color:#FFAB91;}
.chip-c7{background:#F9FBE7;color:#558B2F;border-color:#C5E1A5;}
.chip-c8{background:#EDE7F6;color:#4527A0;border-color:#B39DDB;}
.chip-c9{background:#E0F2F1;color:#004D40;border-color:#80CBC4;}
.chip-c10{background:#FFF3E0;color:#E65100;border-color:#FFCC80;}
.chip-c11{background:#FCE4EC;color:#C62828;border-color:#EF9A9A;}
.chip-c12{background:#E8EAF6;color:#283593;border-color:#9FA8DA;}
.chip-c13{background:#F1F8E9;color:#33691E;border-color:#AED581;}
.chip-c14{background:#FFF9C4;color:#F57F17;border-color:#FFF176;}
.chip-c15{background:#E0F7FA;color:#00695C;border-color:#80DEEA;}
.chip-c16{background:#FCE4EC;color:#AD1457;border-color:#F06292;}
.chip-c17{background:#FFFDE7;color:#F9A825;border-color:#FFE082;}

/* SELECTED HINT */
.sel-hint{text-align:center;font-size:15px;font-weight:800;color:var(--green);min-height:24px;margin-bottom:14px;font-family:'Caveat',cursive;font-size:18px;transition:all 0.2s;position:relative;z-index:1;}

/* SCENARIOS */
.scenario{
  background:#fff;
  border:2.5px solid #C0EFE0;
  border-radius:20px;
  padding:20px;
  margin-bottom:16px;
  box-shadow:0 4px 16px #06D6A018;
  transition:border-color 0.2s,box-shadow 0.2s;
  position:relative;
  z-index:1;
}
.scenario:hover{border-color:var(--mint);box-shadow:0 6px 20px #06D6A030;}
.sc-num{display:inline-block;background:var(--green);color:#fff;font-size:11px;font-weight:900;border-radius:8px;padding:3px 12px;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase;font-family:'Nunito',sans-serif;}
.sc-title{font-family:'Fredoka One',cursive;font-size:17px;color:var(--green);margin-bottom:12px;letter-spacing:0.3px;}
.sc-body{font-size:15px;font-weight:700;line-height:2.3;color:var(--text);}

/* BLANKS */
.blank{
  display:inline-block;
  min-width:120px;
  border-bottom:3px solid var(--mint);
  border-radius:8px;
  background:var(--mint-light);
  padding:3px 12px;
  margin:0 3px;
  font-weight:800;
  color:var(--green);
  cursor:pointer;
  vertical-align:middle;
  text-align:center;
  font-family:'Caveat',cursive;
  font-size:17px;
  transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  position:relative;
  border:2px dashed var(--mint);
  box-shadow:0 2px 8px #06D6A020;
}
.blank:hover{background:var(--mint);color:#fff;transform:scale(1.05);border-style:solid;}
.blank.filled{background:#D0FFF0;color:var(--green);border-color:var(--green);border-style:solid;}
.blank.correct{background:#AAFFD8;color:#004D2A;border-color:var(--mint);border-style:solid;animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1);}
.blank.wrong  {background:#FFE0E8;color:#990033;border-color:var(--red);border-style:solid;animation:shake 0.4s;}
.blank.target {outline:3px solid var(--green);outline-offset:3px;background:var(--mint);color:#fff;border-style:solid;}
.blank.drag-over{background:var(--yellow);border-color:var(--orange);color:#333;transform:scale(1.08);border-style:solid;}
@keyframes popIn{from{transform:scale(0.6) rotate(-5deg);opacity:0}to{transform:scale(1) rotate(0);opacity:1}}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* DRAG GHOST */
#dragGhost{
  position:fixed;
  pointer-events:none;
  z-index:9999;
  border-radius:24px;
  padding:8px 18px;
  font-weight:800;
  font-size:14px;
  font-family:'Nunito',sans-serif;
  box-shadow:0 8px 24px rgba(0,0,0,0.25);
  transform:rotate(-4deg) scale(1.1);
  transition:none;
  display:none;
}

/* BUTTONS */
.btn-check{display:block;width:100%;max-width:340px;margin:0 auto 14px;padding:15px;background:linear-gradient(135deg,var(--green),#0A4A30);color:#fff;border:none;border-radius:30px;font-family:'Fredoka One',cursive;font-size:20px;letter-spacing:1px;cursor:pointer;box-shadow:0 6px 20px #1B7A5650;transition:transform 0.18s cubic-bezier(.34,1.56,.64,1),box-shadow 0.18s;position:relative;z-index:1;}
.btn-check:hover{transform:scale(1.05) translateY(-3px);box-shadow:0 10px 28px #1B7A5660;}
.btn-check:active{transform:scale(0.97);}

/* FEEDBACK */
.feedback{text-align:center;padding:14px 18px;border-radius:16px;font-weight:800;font-size:17px;margin-bottom:14px;display:none;animation:bounceIn 0.45s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:1;font-family:'Nunito',sans-serif;}
.feedback.good{background:var(--mint-light);color:var(--green);border:2.5px solid var(--mint);}
.feedback.bad {background:#FFE0E8;color:#990033;border:2.5px solid var(--red);}
@keyframes bounceIn{from{transform:scale(0.5) translateY(-20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}

/* RESULT */
.result{display:none;text-align:center;background:#fff;border:2.5px solid #C0EFE0;border-radius:22px;padding:28px 20px;box-shadow:0 8px 30px #06D6A025;animation:bounceIn 0.5s cubic-bezier(.34,1.56,.64,1);position:relative;z-index:1;}
.r-emoji{font-size:52px;margin-bottom:8px;animation:wobble 2s ease-in-out infinite;}
@keyframes wobble{0%,100%{transform:rotate(-5deg)}50%{transform:rotate(5deg)}}
.r-title{font-family:'Fredoka One',cursive;font-size:30px;color:var(--green);margin-bottom:8px;letter-spacing:1px;}
.r-msg{font-size:15px;color:#555;margin-bottom:22px;font-weight:700;line-height:1.6;}
.btn-row{display:flex;gap:12px;justify-content:center;flex-wrap:wrap;}
.btn-r{padding:12px 26px;background:linear-gradient(135deg,var(--yellow),var(--orange));color:#333;border:none;border-radius:28px;font-family:'Fredoka One',cursive;font-size:17px;letter-spacing:0.5px;cursor:pointer;transition:transform 0.15s,box-shadow 0.15s;box-shadow:0 4px 14px #FFD16655;}
.btn-n{padding:12px 26px;background:linear-gradient(135deg,var(--peach),#FF5C3C);color:#fff;border:none;border-radius:28px;font-family:'Fredoka One',cursive;font-size:17px;letter-spacing:0.5px;cursor:pointer;box-shadow:0 4px 16px #FF8C6955;transition:transform 0.15s,box-shadow 0.15s;}
.btn-r:hover,.btn-n:hover{transform:scale(1.08) translateY(-2px);box-shadow:0 8px 22px rgba(0,0,0,0.2);}

/* instruction pill */
.instr{display:flex;align-items:center;gap:8px;background:linear-gradient(135deg,#fff9e6,#fff);border:2px solid var(--yellow);border-radius:14px;padding:10px 14px;margin-bottom:14px;font-size:13px;font-weight:800;color:#7a6000;position:relative;z-index:1;}
.instr-icon{font-size:18px;flex-shrink:0;}
</style>
</head>
<body>

<!-- Floating confetti dots -->
<div class="confetti-bg" id="confettiBg"></div>

<div class="logo">⭐ Planrs</div>

<div class="header">
  <div class="badge">Section 3 of 4</div>
  <h1>🚪 Escape the Scammer!</h1>
  <div style="font-size:26px;margin:8px 0;letter-spacing:4px">🛑 🤔 🚫 📢</div>
  <div class="sub">Fill in the Blanks · Class 5–10 · Planrs EdTech</div>
</div>

<div class="score-bar">
  <span class="s-lbl">Score</span>
  <span class="s-n" id="sN">0</span>
  <span class="s-t">/9</span>
  <div class="s-wrap"><div class="s-bar" id="sBar" style="width:0%"></div></div>
  <span style="font-size:12px;font-weight:800;color:var(--muted)" id="sStatus">0/9 filled</span>
</div>

<div class="instr">
  <span class="instr-icon">💡</span>
  <span><b>Drag</b> a word chip onto a blank — or <b>tap</b> a chip then tap a blank!</span>
</div>

<div class="wb-wrap">
  <div class="wb-header">
    <span class="wb-title">🗂️ Word Bank</span>
    <button class="wb-close" id="wbToggle" onclick="toggleWordBank()" title="Hide/show word bank">✕</button>
  </div>
  <div class="word-bank expanded" id="wordBank"></div>
</div>

<div class="sel-hint" id="selHint">☝️ First tap or drag a word from the bank above</div>

<div id="scenarios"></div>

<div class="feedback" id="fb"></div>
<button class="btn-check" id="chkBtn" onclick="checkAll()">Check Answers ✔️</button>

<div class="result" id="result">
  <div class="r-emoji" id="rE">🎉</div>
  <div class="r-title" id="rT">Escape Artist!</div>
  <div class="r-msg" id="rM"></div>
  <div class="btn-row">
    <button class="btn-r" onclick="init()">🔄 Try Again</button>
    <button class="btn-n" onclick="alert('Onto Section 4 Final Quiz! 🏆')">Final Quiz ➡️</button>
  </div>
</div>

<!-- Drag ghost element -->
<div id="dragGhost"></div>

<script>
const SCENARIOS=[
  {
    num:"01",
    title:"🎭 The WhatsApp Prize Trap",
    parts:["You receive: 'You WON ₹50,000! Send your ",
           " to claim.' You should ",
           " the message and immediately tell a ",
           "."],
    blanks:["bank OTP","delete / ignore","trusted adult"]
  },
  {
    num:"02",
    title:"🛒 The ₹99 iPhone Website",
    parts:["A website is selling an iPhone for ₹999. Before buying, always check that the URL starts with ",
           ". If the price seems impossible, the site is likely ",
           ". Never share your ",
           " details on suspicious sites."],
    blanks:["https://","fake","payment card"]
  },
  {
    num:"03",
    title:"📧 The Panicking Email",
    parts:["An email says: 'Your account is ",
           "! Click here now!' Scammers use ",
           " to stop you thinking clearly. The STOP-THINK-ACT rule says to always ",
           " before clicking any link."],
    blanks:["hacked","urgency","PAUSE"]
  }
];

const ALL_WORDS=["bank OTP","delete / ignore","trusted adult","https://","fake","payment card","hacked","urgency","PAUSE","share OTP","verify","call police","download","forward","real","phishing","block","ignore all"];

// Assign colors round-robin
const chipColors=ALL_WORDS.reduce((m,w,i)=>{m[w]='chip-c'+(i%18);return m;},{});

let selectedWord=null;
let filledCount=0;
let wbOpen=true;

// Drag state
let dragWord=null;
let dragChipEl=null;

/* ── CONFETTI BG ── */
function makeConfetti(){
  const bg=document.getElementById('confettiBg');
  const colors=['#06D6A0','#FFD166','#FF8C69','#B388FF','#64B5F6','#FF80AB','#A5D6A7'];
  for(let i=0;i<22;i++){
    const d=document.createElement('div');
    d.className='dot';
    const s=8+Math.random()*18;
    d.style.cssText=`width:${s}px;height:${s}px;background:${colors[i%colors.length]};left:${Math.random()*100}%;animation-duration:${8+Math.random()*14}s;animation-delay:${-Math.random()*14}s;`;
    bg.appendChild(d);
  }
}

function toggleWordBank(){
  wbOpen=!wbOpen;
  const wb=document.getElementById('wordBank');
  const btn=document.getElementById('wbToggle');
  if(wbOpen){
    wb.classList.remove('collapsed');
    wb.classList.add('expanded');
    btn.textContent='✕';
    btn.title='Hide word bank';
  } else {
    wb.classList.add('collapsed');
    wb.classList.remove('expanded');
    btn.textContent='＋';
    btn.title='Show word bank';
  }
}

function init(){
  selectedWord=null; filledCount=0; wbOpen=true;
  document.getElementById('sN').textContent=0;
  document.getElementById('sBar').style.width='0%';
  document.getElementById('sStatus').textContent='0/9 filled';
  document.getElementById('fb').style.display='none';
  document.getElementById('result').style.display='none';
  document.getElementById('chkBtn').style.display='block';
  document.getElementById('selHint').textContent='☝️ First tap or drag a word from the bank above';
  const wb=document.getElementById('wordBank');
  wb.classList.remove('collapsed');
  wb.classList.add('expanded');
  document.getElementById('wbToggle').textContent='✕';

  // Build word bank
  wb.innerHTML='';
  shuffled(ALL_WORDS).forEach(w=>{
    wb.appendChild(makeChip(w));
  });

  // Scenarios
  const cont=document.getElementById('scenarios');
  cont.innerHTML='';
  let bi=0;
  SCENARIOS.forEach(sc=>{
    const box=document.createElement('div');
    box.className='scenario';
    box.innerHTML=`<div class="sc-num">Scenario ${sc.num}</div><div class="sc-title">${sc.title}</div>`;
    const body=document.createElement('div');
    body.className='sc-body';
    sc.parts.forEach((part,pi)=>{
      body.appendChild(document.createTextNode(part));
      if(pi<sc.blanks.length){
        const blank=document.createElement('span');
        blank.className='blank';
        blank.textContent='_____';
        blank.dataset.ans=sc.blanks[pi];
        blank.dataset.idx=bi++;
        // Click to fill
        blank.onclick=()=>fillBlankByClick(blank);
        // Drag-over events
        blank.addEventListener('dragover',e=>{e.preventDefault();blank.classList.add('drag-over');});
        blank.addEventListener('dragleave',()=>blank.classList.remove('drag-over'));
        blank.addEventListener('drop',e=>{e.preventDefault();blank.classList.remove('drag-over');dropOnBlank(blank);});
        // Touch drop via touchend bubbling handled globally
        body.appendChild(blank);
      }
    });
    box.appendChild(body);
    cont.appendChild(box);
  });
}

function makeChip(w){
  const chip=document.createElement('div');
  chip.className=`word-chip ${chipColors[w]}`;
  chip.textContent=w;
  chip.dataset.w=w;
  chip.draggable=true;

  // Click
  chip.onclick=()=>selectWord(chip,w);

  // Desktop drag
  chip.addEventListener('dragstart',e=>{
    if(chip.classList.contains('used'))return;
    dragWord=w; dragChipEl=chip;
    chip.classList.add('dragging');
    e.dataTransfer.effectAllowed='move';
    e.dataTransfer.setData('text/plain',w);
    const ghost=document.getElementById('dragGhost');
    ghost.textContent=w;
    ghost.className='';
    ghost.style.cssText=`padding:8px 18px;border-radius:24px;font-weight:800;font-size:14px;font-family:'Nunito',sans-serif;box-shadow:0 8px 24px rgba(0,0,0,0.25);transform:rotate(-4deg) scale(1.1);position:fixed;pointer-events:none;z-index:9999;display:block;`;
    // copy background from chip
    const s=getComputedStyle(chip);
    ghost.style.background=s.background;
    ghost.style.color=s.color;
    ghost.style.border=s.border;
    e.dataTransfer.setDragImage(ghost,60,20);
  });
  chip.addEventListener('dragend',()=>{
    chip.classList.remove('dragging');
    document.getElementById('dragGhost').style.display='none';
    dragWord=null; dragChipEl=null;
  });

  // Touch drag
  let touchStartX,touchStartY,touchGhost=null;
  chip.addEventListener('touchstart',e=>{
    if(chip.classList.contains('used'))return;
    const t=e.touches[0];
    touchStartX=t.clientX; touchStartY=t.clientY;
    dragWord=w; dragChipEl=chip;
    // create visual ghost
    touchGhost=chip.cloneNode(true);
    touchGhost.style.cssText=`position:fixed;top:${t.clientY-20}px;left:${t.clientX-40}px;z-index:9999;pointer-events:none;transform:rotate(-4deg) scale(1.12);opacity:0.9;`;
    document.body.appendChild(touchGhost);
  },{passive:true});
  chip.addEventListener('touchmove',e=>{
    if(!touchGhost)return;
    e.preventDefault();
    const t=e.touches[0];
    touchGhost.style.top=(t.clientY-20)+'px';
    touchGhost.style.left=(t.clientX-40)+'px';
    // highlight nearest blank
    document.querySelectorAll('.blank').forEach(b=>b.classList.remove('drag-over'));
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.classList.contains('blank'))el.classList.add('drag-over');
  },{passive:false});
  chip.addEventListener('touchend',e=>{
    if(touchGhost){document.body.removeChild(touchGhost);touchGhost=null;}
    document.querySelectorAll('.blank').forEach(b=>b.classList.remove('drag-over'));
    if(!dragWord)return;
    const t=e.changedTouches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el&&el.classList.contains('blank')&&!el.classList.contains('correct')){
      dropOnBlank(el);
    }
    dragWord=null; dragChipEl=null;
  },{passive:true});

  return chip;
}

function shuffled(a){return [...a].sort(()=>Math.random()-0.5);}

function selectWord(chip,word){
  if(chip.classList.contains('used'))return;
  document.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('selected'));
  chip.classList.add('selected');
  selectedWord=word;
  document.getElementById('selHint').textContent=`✅ "${word}" selected — now tap a blank 👇`;
}

function fillBlankByClick(blank){
  if(blank.classList.contains('correct'))return;
  if(!selectedWord){
    document.getElementById('selHint').textContent='⚠️ Tap a word first!';
    blank.classList.add('target');
    setTimeout(()=>blank.classList.remove('target'),1500);
    return;
  }
  placeWord(blank,selectedWord);
  selectedWord=null;
  document.querySelectorAll('.word-chip').forEach(c=>c.classList.remove('selected'));
  document.getElementById('selHint').textContent='☝️ Select another word from the bank';
}

function dropOnBlank(blank){
  if(!dragWord||blank.classList.contains('correct'))return;
  placeWord(blank,dragWord);
}

function placeWord(blank,word){
  // Un-use previously placed word in this blank
  const prev=blank.dataset.filled;
  if(prev){
    const prevChip=document.querySelector(`.word-chip[data-w="${CSS.escape(prev)}"]`);
    if(prevChip) prevChip.classList.remove('used');
  } else {
    filledCount++;
    document.getElementById('sStatus').textContent=`${filledCount}/9 filled`;
    document.getElementById('sBar').style.width=(filledCount/9*100)+'%';
  }

  blank.textContent=word;
  blank.classList.remove('wrong','target');
  blank.classList.add('filled');
  blank.dataset.filled=word;

  const chip=document.querySelector(`.word-chip[data-w="${CSS.escape(word)}"]`);
  if(chip) chip.classList.add('used');
}

function checkAll(){
  const blanks=document.querySelectorAll('.blank');
  const unfilled=[...blanks].filter(b=>!b.dataset.filled);
  if(unfilled.length>0){
    showFB('bad',`⚠️ Fill in the ${unfilled.length} remaining blank(s) first!`);
    unfilled.forEach(b=>{b.classList.add('target');setTimeout(()=>b.classList.remove('target'),1800);});
    return;
  }
  let correct=0;
  blanks.forEach(b=>{
    const ok=b.dataset.filled===b.dataset.ans;
    b.classList.remove('filled','wrong','correct');
    b.classList.add(ok?'correct':'wrong');
    if(ok)correct++;
  });
  document.getElementById('sN').textContent=correct;
  document.getElementById('sBar').style.width=(correct/9*100)+'%';
  document.getElementById('chkBtn').style.display='none';

  if(correct===9){
    showFB('good','🏆 Outstanding! Every blank filled perfectly! You\'re a Scam Escape Champion!');
  } else if(correct>=6){
    showFB('good',`✅ Great! ${correct}/9 correct. Review the red blanks!`);
  } else {
    showFB('bad',`❌ ${correct}/9 correct. Check red blanks and try again!`);
  }

  const res=document.getElementById('result');
  res.style.display='block';
  const[e,t,m]=correct===9
    ?['🎉','Escape Artist!','You filled every blank correctly! You know the STOP-THINK-ACT method perfectly!']
    :correct>=6
    ?['⭐','Almost There!',`${correct}/9 right! Look at the red blanks and try once more.`]
    :['📚','Keep Practising!',`${correct}/9 right. Re-read Section 3 and try again!`];
  document.getElementById('rE').textContent=e;
  document.getElementById('rT').textContent=t;
  document.getElementById('rM').textContent=m;
}

function showFB(type,msg){
  const fb=document.getElementById('fb');
  fb.className='feedback '+type;
  fb.textContent=msg;
  fb.style.display='block';
}

makeConfetti();
init();
</script>
