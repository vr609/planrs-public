<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Section 4 – Final Safety Quiz! | Planrs</title>
<link href="https://fonts.googleapis.com/css2?family=Boogaloo&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
:root{
  --c1:#FF6B6B; --c2:#FFE66D; --c3:#4ECDC4; --c4:#A29BFE;
  --c5:#FD79A8; --c6:#6C5CE7; --c7:#00B894; --c8:#FDCB6E;
  --bg:#FFF5E6; --card:#FFFFFF; --text:#2D3436;
}
*{box-sizing:border-box;margin:0;padding:0;}
body{
  font-family:'Nunito',sans-serif;
  background:var(--bg);
  min-height:100vh;
  padding:12px;
  color:var(--text);
  background-image:
    radial-gradient(circle at 10% 10%, #FFE66D44 0%,transparent 40%),
    radial-gradient(circle at 90% 20%, #A29BFE44 0%,transparent 40%),
    radial-gradient(circle at 50% 80%, #4ECDC444 0%,transparent 40%);
  overflow-x:hidden;
}

/* ── FLOATING DECO ── */
.deco{position:fixed;pointer-events:none;z-index:0;font-size:28px;animation:floaty 6s ease-in-out infinite;opacity:0.3;}
.deco:nth-child(1){top:5%;left:3%;animation-delay:0s;}
.deco:nth-child(2){top:12%;right:5%;animation-delay:1s;}
.deco:nth-child(3){top:40%;left:1%;animation-delay:2s;}
.deco:nth-child(4){top:55%;right:2%;animation-delay:0.5s;}
.deco:nth-child(5){bottom:20%;left:4%;animation-delay:3s;}
.deco:nth-child(6){bottom:10%;right:6%;animation-delay:1.5s;}
@keyframes floaty{0%,100%{transform:translateY(0) rotate(0deg)}50%{transform:translateY(-18px) rotate(12deg)}}

/* ── CLOSE BUTTON ── */
.close-btn{
  position:fixed;top:12px;left:12px;z-index:1000;
  width:44px;height:44px;
  background:linear-gradient(135deg,var(--c1),#E55656);
  border:3px solid #fff;
  border-radius:50%;
  font-size:20px;
  cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 4px 18px #FF6B6B66;
  transition:transform 0.2s cubic-bezier(.34,1.56,.64,1);
  color:#fff;font-weight:900;
}
.close-btn:hover{transform:scale(1.2) rotate(90deg);}

/* ── LOGO ── */
.logo{position:fixed;top:12px;right:12px;font-family:'Boogaloo',cursive;font-size:14px;color:#fff;background:linear-gradient(135deg,var(--c6),var(--c4));border-radius:20px;padding:6px 14px;z-index:999;box-shadow:0 3px 12px #6C5CE766;}

/* ── HEADER ── */
.header{text-align:center;padding:10px 0 14px;position:relative;z-index:1;}
.badge{display:inline-block;background:linear-gradient(135deg,var(--c5),var(--c1));color:#fff;font-family:'Boogaloo',cursive;font-size:14px;border-radius:20px;padding:6px 18px;margin-bottom:8px;box-shadow:0 4px 14px #FD79A855;animation:wiggle 2s ease-in-out infinite;}
@keyframes wiggle{0%,100%{transform:rotate(-2deg)}50%{transform:rotate(2deg)}}
h1{font-family:'Boogaloo',cursive;font-size:clamp(22px,7vw,40px);background:linear-gradient(135deg,var(--c6),var(--c1),var(--c2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
.sub{font-size:13px;color:#888;font-weight:700;margin-top:4px;}

/* ── TOP BAR ── */
.top-bar{
  background:#fff;border:3px solid transparent;
  background-clip:padding-box;
  border-radius:18px;padding:12px 16px;margin-bottom:14px;
  box-shadow:0 4px 20px rgba(0,0,0,0.1);
  position:relative;z-index:1;
}
.top-bar::before{content:'';position:absolute;inset:-3px;border-radius:18px;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c4));z-index:-1;}
.top-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
.t-score{display:flex;align-items:baseline;gap:4px;}
.t-lbl{font-size:10px;font-weight:900;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;}
.t-num{font-family:'Boogaloo',cursive;font-size:36px;color:var(--c8);text-shadow:0 2px 0 #E5A800;}
.t-tot{font-size:13px;color:#bbb;font-weight:700;}
.t-qnum{font-family:'Boogaloo',cursive;font-size:20px;color:var(--c6);}
.prog-wrap{background:#F0EEFF;border-radius:10px;height:14px;overflow:hidden;border:2px solid #E0D8FF;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--c1),var(--c2),var(--c3),var(--c4));border-radius:10px;transition:width 0.6s cubic-bezier(.34,1.56,.64,1);}

/* ── QUESTION CARD ── */
.q-card{
  background:#fff;
  border:3px solid transparent;
  background-clip:padding-box;
  border-radius:22px;
  padding:20px 18px 16px;
  margin-bottom:14px;
  box-shadow:0 6px 24px rgba(0,0,0,0.1);
  animation:popIn 0.45s cubic-bezier(.34,1.56,.64,1);
  position:relative;z-index:1;
}
.q-card::before{content:'';position:absolute;inset:-3px;border-radius:22px;background:linear-gradient(135deg,var(--c2),var(--c3));z-index:-1;}
@keyframes popIn{from{transform:scale(0.8) translateY(40px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.q-context{font-size:12px;font-weight:900;color:var(--c6);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.q-dot{width:10px;height:10px;background:linear-gradient(135deg,var(--c1),var(--c5));border-radius:50%;animation:pulse 1.5s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.4)}}
.q-text{font-size:15px;font-weight:800;color:var(--text);line-height:1.5;margin-bottom:14px;}
.q-emoji{font-size:40px;display:block;margin-bottom:6px;animation:spin 0.6s cubic-bezier(.34,1.56,.64,1);}
@keyframes spin{from{transform:rotate(-30deg) scale(0.5)}to{transform:rotate(0) scale(1)}}

/* ── DRAG & DROP ZONE ── */
.dnd-container{margin-bottom:14px;}
.dnd-label{font-size:11px;font-weight:900;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:8px;text-align:center;}
.drag-items{display:flex;flex-wrap:wrap;gap:8px;padding:12px;background:#F8F9FF;border:2.5px dashed #D0CCFF;border-radius:16px;min-height:54px;transition:all 0.2s;}
.drag-items.drag-over{background:#EEF0FF;border-color:var(--c4);transform:scale(1.01);}
.drag-item{
  padding:9px 14px;
  border-radius:30px;
  font-size:13px;font-weight:800;
  cursor:grab;
  display:flex;align-items:center;gap:6px;
  transition:transform 0.15s cubic-bezier(.34,1.56,.64,1), box-shadow 0.15s;
  user-select:none;
  touch-action:none;
  border:2.5px solid transparent;
  position:relative;
  animation:dropBounce 0.4s cubic-bezier(.34,1.56,.64,1);
}
@keyframes dropBounce{from{transform:scale(0.7) translateY(-20px);opacity:0}to{transform:scale(1);opacity:1}}
.drag-item:hover{transform:scale(1.08) rotate(2deg);box-shadow:0 8px 20px rgba(0,0,0,0.18);}
.drag-item:active{cursor:grabbing;transform:scale(1.12) rotate(4deg);}
.drag-item.dragging{opacity:0.35;transform:scale(0.9);}
.item-letter{width:24px;height:24px;border-radius:8px;background:rgba(255,255,255,0.5);display:flex;align-items:center;justify-content:center;font-family:'Boogaloo',cursive;font-size:13px;}

/* Colour each drag item distinctly */
.drag-item:nth-child(1){background:linear-gradient(135deg,#FFD93D,#FF6B6B);color:#fff;box-shadow:0 4px 14px #FF6B6B44;}
.drag-item:nth-child(2){background:linear-gradient(135deg,#4ECDC4,#44D9CC);color:#fff;box-shadow:0 4px 14px #4ECDC444;}
.drag-item:nth-child(3){background:linear-gradient(135deg,#A29BFE,#6C5CE7);color:#fff;box-shadow:0 4px 14px #A29BFE44;}
.drag-item:nth-child(4){background:linear-gradient(135deg,#FD79A8,#E84393);color:#fff;box-shadow:0 4px 14px #FD79A844;}

.drop-zone{
  padding:12px;
  background:#FFFEF0;
  border:2.5px dashed #FFD93D;
  border-radius:16px;
  min-height:58px;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.2s;
  flex-wrap:wrap;
  gap:8px;
}
.drop-zone.drag-over{background:#FFFBD0;border-color:var(--c8);transform:scale(1.02);box-shadow:0 4px 20px #FFD93D44;}
.drop-zone.has-answer{border-style:solid;background:#F0FFF8;border-color:var(--c3);}
.drop-placeholder{font-size:13px;color:#CCC;font-weight:800;font-family:'Boogaloo',cursive;letter-spacing:1px;}

.answer-area-label{font-size:11px;font-weight:900;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px;display:flex;align-items:center;gap:6px;}
.arrow-hint{font-size:20px;animation:bounce 1s ease-in-out infinite;}
@keyframes bounce{0%,100%{transform:translateY(0)}50%{transform:translateY(6px)}}

/* ── FALLBACK MC OPTIONS ── */
.options{display:flex;flex-direction:column;gap:8px;}
.opt{
  background:#F8F9FF;
  border:2.5px solid #E0D8FF;
  border-radius:14px;padding:12px 14px;
  font-size:14px;font-weight:800;text-align:left;
  cursor:pointer;transition:all 0.2s cubic-bezier(.34,1.56,.64,1);
  color:var(--text);display:flex;align-items:flex-start;gap:10px;line-height:1.4;
}
.opt:hover:not(:disabled){transform:scale(1.02) translateX(6px);}
.opt:disabled{cursor:default;}
.opt-letter{
  width:28px;height:28px;min-width:28px;
  border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-family:'Boogaloo',cursive;font-size:15px;
  flex-shrink:0;margin-top:1px;
}
.opt:nth-child(1){border-color:#FF6B6B88;} .opt:nth-child(1) .opt-letter{background:linear-gradient(135deg,#FF6B6B,#FF8E8E);color:#fff;}
.opt:nth-child(2){border-color:#4ECDC488;} .opt:nth-child(2) .opt-letter{background:linear-gradient(135deg,#4ECDC4,#7EECE8);color:#fff;}
.opt:nth-child(3){border-color:#A29BFE88;} .opt:nth-child(3) .opt-letter{background:linear-gradient(135deg,#A29BFE,#C4BCFF);color:#fff;}
.opt:nth-child(4){border-color:#FD79A888;} .opt:nth-child(4) .opt-letter{background:linear-gradient(135deg,#FD79A8,#FF9EC4);color:#fff;}
.opt:hover:not(:disabled){background:#EEF0FF;border-color:var(--c4);}
.opt.correct{background:#D5F5EF!important;border-color:var(--c3)!important;color:#00695C!important;}
.opt.correct .opt-letter{background:linear-gradient(135deg,#00B894,#00D2B0)!important;color:#fff!important;}
.opt.wrong{background:#FFE4E8!important;border-color:var(--c1)!important;color:#C0392B!important;animation:shake 0.4s;}
.opt.wrong .opt-letter{background:linear-gradient(135deg,#FF6B6B,#FF4444)!important;color:#fff!important;}
@keyframes shake{0%,100%{transform:translateX(0)}20%{transform:translateX(-8px)}40%{transform:translateX(8px)}60%{transform:translateX(-5px)}80%{transform:translateX(5px)}}

/* ── EXPLANATION ── */
.explain{
  display:none;margin-top:12px;
  padding:12px 14px;
  background:linear-gradient(135deg,#FFFBE6,#FFF4CC);
  border-left:5px solid var(--c2);
  border-radius:12px;font-size:13px;font-weight:700;color:#5A4000;
  line-height:1.6;animation:fadeIn 0.3s ease;
  border:2px solid var(--c2);border-left-width:5px;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* ── NEXT BUTTON ── */
.btn-next{
  display:none;width:100%;margin-top:12px;padding:14px;
  background:linear-gradient(135deg,var(--c6),var(--c4));
  color:#fff;border:none;border-radius:30px;
  font-family:'Boogaloo',cursive;font-size:20px;
  cursor:pointer;box-shadow:0 6px 20px #A29BFE66;
  transition:transform 0.18s cubic-bezier(.34,1.56,.64,1);
  animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1);
  letter-spacing:1px;
}
.btn-next:hover{transform:scale(1.05) translateY(-3px);}

/* ── RESULT ── */
.result{
  display:none;text-align:center;background:#fff;
  border:3px solid transparent;background-clip:padding-box;
  border-radius:24px;padding:28px 18px;
  box-shadow:0 10px 40px rgba(0,0,0,0.12);
  animation:popIn 0.5s cubic-bezier(.34,1.56,.64,1);
  position:relative;z-index:1;
}
.result::before{content:'';position:absolute;inset:-3px;border-radius:24px;background:linear-gradient(135deg,var(--c1),var(--c2),var(--c3),var(--c4),var(--c5));z-index:-1;}
.cert{
  display:inline-block;
  background:linear-gradient(135deg,var(--c6),var(--c4),var(--c5));
  border-radius:20px;padding:20px 28px;margin-bottom:14px;
  box-shadow:0 8px 28px #A29BFE55;
}
.cert-icon{font-size:56px;display:block;margin-bottom:6px;animation:spin 0.8s cubic-bezier(.34,1.56,.64,1);}
.cert-text{font-family:'Boogaloo',cursive;font-size:20px;color:#fff;letter-spacing:2px;}
.r-score{font-family:'Boogaloo',cursive;font-size:60px;color:var(--c8);line-height:1;text-shadow:0 4px 0 #E5A800;}
.r-label{font-size:11px;font-weight:900;color:#aaa;text-transform:uppercase;letter-spacing:1.5px;margin-bottom:10px;}
.r-title{font-family:'Boogaloo',cursive;font-size:28px;background:linear-gradient(135deg,var(--c6),var(--c1));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px;}
.r-msg{font-size:14px;color:#666;margin-bottom:20px;font-weight:700;line-height:1.6;max-width:340px;margin-left:auto;margin-right:auto;}
.star-row{font-size:30px;margin-bottom:14px;letter-spacing:4px;}
.btn-row{display:flex;gap:10px;justify-content:center;flex-wrap:wrap;}
.btn-r{padding:12px 22px;background:linear-gradient(135deg,#F0EEFF,#E0D8FF);color:var(--c6);border:2px solid #D0C8FF;border-radius:28px;font-family:'Boogaloo',cursive;font-size:18px;cursor:pointer;transition:transform 0.15s cubic-bezier(.34,1.56,.64,1);box-shadow:0 4px 14px #A29BFE33;}
.btn-r:hover{transform:scale(1.08);}
.btn-share{padding:12px 22px;background:linear-gradient(135deg,var(--c2),#FFB700);color:#5A3A00;border:none;border-radius:28px;font-family:'Boogaloo',cursive;font-size:18px;cursor:pointer;box-shadow:0 4px 14px #FFD93D66;transition:transform 0.15s cubic-bezier(.34,1.56,.64,1);}
.btn-share:hover{transform:scale(1.08);}

/* ── MODAL CLOSE OVERLAY ── */
.modal-overlay{
  position:fixed;inset:0;background:rgba(0,0,0,0.0);
  z-index:2000;display:none;align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
  animation:overlayIn 0.2s ease;
}
.modal-overlay.show{display:flex;background:rgba(0,0,0,0.5);}
@keyframes overlayIn{from{opacity:0}to{opacity:1}}
.modal-box{
  background:#fff;border-radius:24px;padding:28px 24px;text-align:center;
  max-width:300px;width:90%;
  box-shadow:0 20px 60px rgba(0,0,0,0.3);
  animation:popIn 0.35s cubic-bezier(.34,1.56,.64,1);
  border:3px solid transparent;background-clip:padding-box;position:relative;
}
.modal-box::before{content:'';position:absolute;inset:-3px;border-radius:24px;background:linear-gradient(135deg,var(--c1),var(--c5));z-index:-1;}
.modal-emoji{font-size:52px;margin-bottom:10px;display:block;}
.modal-title{font-family:'Boogaloo',cursive;font-size:22px;color:var(--text);margin-bottom:8px;}
.modal-msg{font-size:14px;color:#888;font-weight:700;margin-bottom:20px;line-height:1.5;}
.modal-btns{display:flex;gap:10px;justify-content:center;}
.modal-btn-yes{padding:11px 24px;background:linear-gradient(135deg,var(--c1),#E84141);color:#fff;border:none;border-radius:24px;font-family:'Boogaloo',cursive;font-size:17px;cursor:pointer;box-shadow:0 4px 14px #FF6B6B55;transition:transform 0.15s cubic-bezier(.34,1.56,.64,1);}
.modal-btn-yes:hover{transform:scale(1.08);}
.modal-btn-no{padding:11px 24px;background:linear-gradient(135deg,var(--c3),#3EC4BC);color:#fff;border:none;border-radius:24px;font-family:'Boogaloo',cursive;font-size:17px;cursor:pointer;box-shadow:0 4px 14px #4ECDC455;transition:transform 0.15s cubic-bezier(.34,1.56,.64,1);}
.modal-btn-no:hover{transform:scale(1.08);}

/* ── DND RESULT FEEDBACK ── */
.dnd-check{display:none;margin-top:10px;text-align:center;font-family:'Boogaloo',cursive;font-size:22px;animation:popIn 0.4s cubic-bezier(.34,1.56,.64,1);}
.dnd-check.correct{color:var(--c7);}
.dnd-check.wrong{color:var(--c1);}
.submit-dnd{
  width:100%;margin-top:10px;padding:13px;
  background:linear-gradient(135deg,var(--c3),var(--c7));
  color:#fff;border:none;border-radius:28px;
  font-family:'Boogaloo',cursive;font-size:18px;cursor:pointer;
  box-shadow:0 5px 18px #4ECDC466;transition:transform 0.18s cubic-bezier(.34,1.56,.64,1);
  display:none;
}
.submit-dnd:hover{transform:scale(1.04) translateY(-2px);}
</style>
</head>
<body>

<!-- Decorative floating emojis -->
<div class="deco">🌟</div>
<div class="deco">🎈</div>
<div class="deco">✨</div>
<div class="deco">🎉</div>
<div class="deco">🦋</div>
<div class="deco">🌈</div>

<!-- Close button -->
<button class="close-btn" onclick="showCloseModal()" title="Close quiz">✕</button>

<!-- Logo -->
<div class="logo">⭐ Planrs</div>

<!-- Close confirmation modal -->
<div class="modal-overlay" id="closeModal">
  <div class="modal-box">
    <span class="modal-emoji">😮</span>
    <div class="modal-title">Leaving so soon?</div>
    <div class="modal-msg">Are you sure you want to quit the quiz? Your progress will be lost!</div>
    <div class="modal-btns">
      <button class="modal-btn-yes" onclick="closeQuiz()">Yes, quit 🚪</button>
      <button class="modal-btn-no" onclick="hideCloseModal()">Keep going 🎯</button>
    </div>
  </div>
</div>

<div class="header">
  <div class="badge">🏁 SECTION 4 OF 4 — FINAL QUIZ!</div>
  <h1>🛡️ Safety Quest!</h1>
  <div class="sub">Drag the right answer • Answer to win! 🏆</div>
</div>

<div class="top-bar">
  <div class="top-row">
    <div class="t-score">
      <div>
        <div class="t-lbl">⭐ Score</div>
        <div style="display:flex;align-items:baseline;gap:4px">
          <span class="t-num" id="tNum">0</span>
          <span class="t-tot">/8</span>
        </div>
      </div>
    </div>
    <div class="t-qnum" id="tQnum">Q 1/8</div>
  </div>
  <div class="prog-wrap"><div class="prog-fill" id="progFill" style="width:0%"></div></div>
</div>

<div id="quizArea"></div>
<div class="result" id="result">
  <div class="cert">
    <span class="cert-icon" id="certIcon">🏆</span>
    <div class="cert-text" id="certText">SCAM BUSTER</div>
  </div>
  <div class="r-score" id="rScore">0</div>
  <div class="r-label">out of 8 correct</div>
  <div class="star-row" id="starRow">⭐⭐⭐</div>
  <div class="r-title" id="rTitle">Great Job!</div>
  <div class="r-msg" id="rMsg"></div>
  <div class="btn-row">
    <button class="btn-r" onclick="startQuiz()">🔄 Try Again</button>
    <button class="btn-share" onclick="alert('Share feature coming soon! 🎉')">🎉 Share Badge</button>
  </div>
</div>

<script>
const QS=[
  {
    emoji:"📱",ctx:"WhatsApp Message",
    q:"Your friend forwards a WhatsApp link: 'Win FREE Jio data for 2 years! Limited offer!' What do you do?",
    opts:["Click immediately — free data is amazing!","Share with all contacts first","Don't click; ask an adult if it's real","Accept only if your friend says it's safe"],
    ans:2,
    exp:"🧠 Free offers via WhatsApp are almost always scams! Even if a friend sends it — they may have been tricked too. Always verify with an adult before clicking any unusual link.",
    dnd:true
  },
  {
    emoji:"🛒",ctx:"Online Shopping",
    q:"A website sells a brand new PlayStation 5 for just ₹2,000. What's the FIRST thing you check?",
    opts:["Whether free delivery is available","If the URL starts with https:// and looks official","The colour options available","Customer reviews on the same page"],
    ans:1,
    exp:"🔒 Always check for 'https://' in the address bar. If the price seems impossible — ₹2,000 for a PS5 — it's almost certainly fake. Real shops can't sell at a loss!",
    dnd:true
  },
  {
    emoji:"🪪",ctx:"Government Message",
    q:"'I'm from the government. Share your Aadhaar number to receive a ₹5,000 scholarship.' What do you do?",
    opts:["Share Aadhaar — it's a scholarship!","Ignore and block the number","Ask them to call your school","Share only the last 4 digits"],
    ans:1,
    exp:"🚨 Government officials NEVER ask for personal documents via chat or WhatsApp! Sharing your Aadhaar can lead to identity theft. Block and report!",
    dnd:false
  },
  {
    emoji:"🔑",ctx:"Password Safety",
    q:"Which of these is the STRONGEST and safest password?",
    opts:["raj12345","Raj@Mumbai#2024!","RajKumar","password123"],
    ans:1,

let current=0, score=0;
let dragItem=null, dragSourceZone=null;

// ── DRAG & DROP LOGIC ──
function initDragDrop(card, q, currentQ){
  const labels=['A','B','C','D'];
  const colorClasses = ['','','',''];

  // Create draggable answer chips
  const sourceZone = card.querySelector('.drag-items');
  const dropZone   = card.querySelector('.drop-zone');
  const submitBtn  = card.querySelector('.submit-dnd');

  q.opts.forEach((opt,i)=>{
    const el=document.createElement('div');
    el.className='drag-item';
    el.dataset.idx=i;
    el.draggable=true;
    el.innerHTML=`<span class="item-letter">${labels[i]}</span>${opt}`;

    // Desktop DnD
    el.addEventListener('dragstart', e=>{
      dragItem=el;
      dragSourceZone=el.parentElement;
      setTimeout(()=>el.classList.add('dragging'),0);
      e.dataTransfer.effectAllowed='move';
    });
    el.addEventListener('dragend',()=>{
      el.classList.remove('dragging');
      dragItem=null;
    });

    // Touch DnD
    let touchOffX=0, touchOffY=0, ghost=null;
    el.addEventListener('touchstart', e=>{
      dragItem=el;
      dragSourceZone=el.parentElement;
      const t=e.touches[0];
      const r=el.getBoundingClientRect();
      touchOffX=t.clientX-r.left;
      touchOffY=t.clientY-r.top;
      ghost=el.cloneNode(true);
      ghost.style.cssText=`position:fixed;opacity:0.85;pointer-events:none;z-index:9999;
        left:${t.clientX-touchOffX}px;top:${t.clientY-touchOffY}px;
        width:${r.width}px;transform:scale(1.1) rotate(5deg);transition:none;`;
      document.body.appendChild(ghost);
      el.style.opacity='0.3';
    },{passive:true});
    el.addEventListener('touchmove', e=>{
      e.preventDefault();
      const t=e.touches[0];
      if(ghost){ghost.style.left=(t.clientX-touchOffX)+'px';ghost.style.top=(t.clientY-touchOffY)+'px';}
      const target=document.elementFromPoint(t.clientX,t.clientY);
      const zone=target && target.closest('.drop-zone, .drag-items');
      document.querySelectorAll('.drag-over').forEach(z=>z.classList.remove('drag-over'));
      if(zone) zone.classList.add('drag-over');
    },{passive:false});
    el.addEventListener('touchend', e=>{
      if(ghost){ghost.remove();ghost=null;}
      el.style.opacity='';
      const t=e.changedTouches[0];
      const target=document.elementFromPoint(t.clientX,t.clientY);
      const zone=target && target.closest('.drop-zone, .drag-items');
      document.querySelectorAll('.drag-over').forEach(z=>z.classList.remove('drag-over'));
      if(zone && zone!==dragSourceZone){
        // Move existing item back if drop zone full
        if(zone.classList.contains('drop-zone')){
          const existing=zone.querySelector('.drag-item');
          if(existing){dragSourceZone.appendChild(existing);}
          zone.appendChild(el);
          zone.classList.add('has-answer');
          submitBtn.style.display='block';
        } else {
          zone.appendChild(el);
          const dz=card.querySelector('.drop-zone');
          if(!dz.querySelector('.drag-item')){dz.classList.remove('has-answer');submitBtn.style.display='none';}
        }
        updatePlaceholder(dropZone);
      }
      dragItem=null;
    });
    sourceZone.appendChild(el);
  });

  // Desktop drop events on dropzone
  [sourceZone, dropZone].forEach(zone=>{
    zone.addEventListener('dragover', e=>{e.preventDefault();zone.classList.add('drag-over');});
    zone.addEventListener('dragleave',()=>zone.classList.remove('drag-over'));
    zone.addEventListener('drop', e=>{
      e.preventDefault();
      zone.classList.remove('drag-over');
      if(!dragItem||dragItem.parentElement===zone) return;
      if(zone.classList.contains('drop-zone')){
        const existing=zone.querySelector('.drag-item');
        if(existing){dragSourceZone.appendChild(existing);}
        zone.appendChild(dragItem);
        zone.classList.add('has-answer');
        submitBtn.style.display='block';
      } else {
        zone.appendChild(dragItem);
        if(!dropZone.querySelector('.drag-item')){dropZone.classList.remove('has-answer');submitBtn.style.display='none';}
      }
      updatePlaceholder(dropZone);
    });
  });
}

function updatePlaceholder(dz){
  const ph=dz.querySelector('.drop-placeholder');
  if(ph) ph.style.display=dz.querySelector('.drag-item')?'none':'block';
}

// ── QUIZ LOGIC ──
function startQuiz(){
  current=0;score=0;
  document.getElementById('tNum').textContent=0;
  document.getElementById('tQnum').textContent='Q 1/8';
  document.getElementById('progFill').style.width='0%';
  document.getElementById('result').style.display='none';
  document.getElementById('quizArea').style.display='block';
  showQ();
}

function showQ(){
  const q=QS[current];
  document.getElementById('tQnum').textContent=`Q ${current+1}/8`;
  document.getElementById('progFill').style.width=((current/8)*100)+'%';
  const area=document.getElementById('quizArea');
  area.innerHTML='';
  const card=document.createElement('div');
  card.className='q-card';

  if(q.dnd){
    // DRAG & DROP MODE
    card.innerHTML=`
      <div class="q-context"><div class="q-dot"></div>${q.ctx}</div>
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-text">${current+1}. ${q.q}</div>
      <div class="dnd-container">
        <div class="dnd-label">🤚 Drag the correct answer below!</div>
        <div class="drag-items"></div>
        <div style="text-align:center;margin:8px 0;">
          <span class="arrow-hint">👇</span>
        </div>
        <div class="answer-area-label">🎯 Drop your answer here:</div>
        <div class="drop-zone has-answer-ready"><div class="drop-placeholder">Drop here!</div></div>
        <button class="submit-dnd" style="display:none;" onclick="checkDnD(this)">✅ Check My Answer!</button>
        <div class="dnd-check" id="dndCheck${current}"></div>
      </div>
      <div class="explain"></div>
      <button class="btn-next">${current<7?'Next Question ➡️':'See My Results 🏆'}</button>
    `;
    area.appendChild(card);
    initDragDrop(card, q, current);
  } else {
    // MC MODE
    card.innerHTML=`
      <div class="q-context"><div class="q-dot"></div>${q.ctx}</div>
      <span class="q-emoji">${q.emoji}</span>
      <div class="q-text">${current+1}. ${q.q}</div>
      <div class="options"></div>
      <div class="explain"></div>
      <button class="btn-next">${current<7?'Next Question ➡️':'See My Results 🏆'}</button>
    `;
    area.appendChild(card);
    const opts=card.querySelector('.options');
    const labels=['A','B','C','D'];
    q.opts.forEach((o,i)=>{
      const btn=document.createElement('button');
      btn.className='opt';
      btn.innerHTML=`<span class="opt-letter">${labels[i]}</span>${o}`;
      btn.onclick=()=>answerMC(btn,i,opts,q,card);
      opts.appendChild(btn);
    });
  }

  const nxt=card.querySelector('.btn-next');
  nxt.onclick=()=>{current++;current<8?showQ():showResult();};
}

function checkDnD(btn){
  const card=btn.closest('.q-card');
  const q=QS[current];
  const dropZone=card.querySelector('.drop-zone');
  const droppedItem=dropZone.querySelector('.drag-item');
  if(!droppedItem) return;

  const idx=parseInt(droppedItem.dataset.idx);
  const ok=idx===q.ans;
  const check=card.querySelector('.dnd-check');

  // Disable all items
  card.querySelectorAll('.drag-item').forEach(el=>{
    el.draggable=false;el.style.cursor='default';
    el.style.pointerEvents='none';
  });
  btn.style.display='none';

  if(ok){
    score++;document.getElementById('tNum').textContent=score;
    droppedItem.style.background='linear-gradient(135deg,#00B894,#00D2B0)';
    droppedItem.style.boxShadow='0 6px 20px #00B89466';
    check.textContent='🎉 Correct! Amazing!';
    check.className='dnd-check correct';
    launchMini();
  } else {
    droppedItem.style.background='linear-gradient(135deg,#FF6B6B,#FF4444)';
    droppedItem.style.boxShadow='0 6px 20px #FF6B6B66';
    check.textContent='❌ Not quite! See the answer below.';
    check.className='dnd-check wrong';
    // Show correct
    const allItems=card.querySelectorAll('.drag-item');
    allItems.forEach(el=>{
      if(parseInt(el.dataset.idx)===q.ans){
        el.style.background='linear-gradient(135deg,#00B894,#00D2B0)';
        el.style.boxShadow='0 6px 20px #00B89466';
      }
    });
  }
  check.style.display='block';
  card.querySelector('.explain').textContent=q.exp;
  card.querySelector('.explain').style.display='block';
  card.querySelector('.btn-next').style.display='block';
}

function answerMC(btn,idx,opts,q,card){
  opts.querySelectorAll('.opt').forEach(b=>b.disabled=true);
  const ok=idx===q.ans;
  btn.classList.add(ok?'correct':'wrong');
  opts.querySelectorAll('.opt')[q.ans].classList.add('correct');
  if(ok){score++;document.getElementById('tNum').textContent=score;launchMini();}
  card.querySelector('.explain').textContent=q.exp;
  card.querySelector('.explain').style.display='block';
  card.querySelector('.btn-next').style.display='block';
}

function launchMini(){
  const colors=['#FF6B6B','#FFE66D','#4ECDC4','#A29BFE','#FD79A8','#00B894'];
  for(let i=0;i<30;i++){
    const d=document.createElement('div');
    const s=6+Math.random()*12;
    d.style.cssText=`position:fixed;left:${Math.random()*100}%;top:-20px;width:${s}px;height:${s}px;background:${colors[i%6]};border-radius:${Math.random()>0.4?'50%':'4px'};z-index:9999;pointer-events:none;animation:fall ${1+Math.random()*1.2}s ease-in ${Math.random()*0.4}s forwards;`;
    document.body.appendChild(d);
    setTimeout(()=>d.remove(),2500);
  }
  if(!document.getElementById('fallStyle')){
    const s=document.createElement('style');s.id='fallStyle';
    s.textContent='@keyframes fall{to{transform:translateY(110vh) rotate(720deg);opacity:0}}';
    document.head.appendChild(s);
  }
}

function showResult(){
  document.getElementById('progFill').style.width='100%';
  document.getElementById('quizArea').style.display='none';
  const res=document.getElementById('result');res.style.display='block';
  document.getElementById('rScore').textContent=score;
  const stars=score>=7?'⭐⭐⭐⭐⭐':score>=5?'⭐⭐⭐⭐':score>=3?'⭐⭐⭐':'⭐⭐';
  document.getElementById('starRow').textContent=stars;
  let ci,ct,rt,rm;
  if(score===8){ci='🏆';ct='CERTIFIED SCAM BUSTER';rt='PERFECT SCORE!';rm='Outstanding! You got every question right! You are a fully Certified Scam Buster! Show this badge to your teacher and protect your family online!';}
  else if(score>=6){ci='⭐';ct='SCAM BUSTER — ALMOST!';rt='Amazing Work!';rm=`${score}/8 correct! You are nearly there. Review the questions you missed and you will be a perfect Scam Buster!`;}
  else if(score>=4){ci='📚';ct='INTERNET SAFETY LEARNER';rt='Keep Going!';rm=`${score}/8 correct. Good effort! Re-read Section 4 notes and try again!`;}
  else{ci='💪';ct='KEEP PRACTISING!';rt="Don't Give Up!";rm=`${score}/8 correct. Go back through the full lesson, then come back and try again. You can do this!`;}
  document.getElementById('certIcon').textContent=ci;
  document.getElementById('certText').textContent=ct;
  document.getElementById('rTitle').textContent=rt;
  document.getElementById('rMsg').textContent=rm;
  if(score===8){for(let x=0;x<3;x++)setTimeout(launchMini,x*600);}
}
